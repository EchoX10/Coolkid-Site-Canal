<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Canal</title>
<style>
body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
header { background: #1e293b; padding: 15px; text-align: center; }
.container { padding: 20px; }
button { padding: 6px; margin: 3px; border: none; border-radius: 8px; background: #22c55e; color: white; }
input { padding: 6px; margin: 3px; border-radius: 8px; border: none; }
.post { background: #1e293b; padding: 10px; border-radius: 10px; margin-top: 10px; }
.comment { background: #334155; padding: 6px; border-radius: 8px; margin-top: 6px; }
.reply { background: #475569; padding: 5px; border-radius: 6px; margin-top: 4px; margin-left: 15px; }
.subreply { background: #64748b; padding: 5px; border-radius: 6px; margin-top: 4px; margin-left: 30px; }
.hidden { display: none; }
</style>
</head>
<body>
<header><h1>Meu Canal 🔥</h1></header><div class="container" id="login">
<button onclick="entrarVisitanteTela()">Login / Criar Conta</button><br><br>
<input id="nomeAdmin" placeholder="Admin">
<input id="senhaAdmin" type="password" placeholder="Senha">
<button onclick="entrarAdmin()">Admin</button>
</div><div class="container hidden" id="visitanteLogin">
<input id="user" placeholder="Usuário (5-10)">
<input id="pass" type="password" placeholder="Senha">
<button onclick="criarConta()">Criar</button>
<button onclick="loginConta()">Entrar</button>
</div><div class="container hidden" id="site">
<h2>Postagens</h2>
<div id="postsDiv"></div><div id="adminArea" class="hidden">
<h3>Criar Post</h3>
<input id="titulo" placeholder="Título">
<input id="conteudo" placeholder="Conteúdo">
<button onclick="criarPost()">Postar</button>
</div>
</div><script>
// credenciais escondidas (base64)
const ADMIN_NOME = atob("Q29vbGtpZA==");
const ADMIN_SENHA = atob("Y29vbGtpZDQ1Nl84");
let usuarioAtual = null;

function entrarVisitanteTela(){ login.classList.add("hidden"); visitanteLogin.classList.remove("hidden"); }
function criarConta(){ let u=user.value,p=pass.value; if(u.length<5||u.length>10)return alert("5-10 caracteres"); localStorage.setItem("user_"+u,p); alert("Conta criada"); }
function loginConta(){ let u=user.value,p=pass.value; if(localStorage.getItem("user_"+u)==p){usuarioAtual=u;entrar(false);}else alert("Erro"); }
function entrarAdmin(){ if(nomeAdmin.value==ADMIN_NOME&&senhaAdmin.value==ADMIN_SENHA){usuarioAtual="ADMIN";entrar(true);}else alert("Erro"); }
function entrar(admin){ login.classList.add("hidden"); visitanteLogin.classList.add("hidden"); site.classList.remove("hidden"); if(admin)adminArea.classList.remove("hidden"); carregar(); }

function criarPost(){ let posts=JSON.parse(localStorage.posts||"[]"); posts.push({titulo:titulo.value,conteudo:conteudo.value,comentarios:[]}); localStorage.posts=JSON.stringify(posts); carregar(); }
function deletarPost(i){ let posts=JSON.parse(localStorage.posts); posts.splice(i,1); localStorage.posts=JSON.stringify(posts); carregar(); }
function editarPost(i){ let posts=JSON.parse(localStorage.posts); let novo=prompt("Novo texto",posts[i].conteudo); if(novo)posts[i].conteudo=novo; localStorage.posts=JSON.stringify(posts); carregar(); }

function comentar(i){ let posts=JSON.parse(localStorage.posts); if(!posts[i].comentarios)posts[i].comentarios=[]; posts[i].comentarios.push({user:usuarioAtual,texto:document.getElementById("c"+i).value,replies:[]}); localStorage.posts=JSON.stringify(posts); carregar(); }

function responder(p,c){ let txt=document.getElementById(`r${p}_${c}`).value; if(!txt)return; let posts=JSON.parse(localStorage.posts); if(!posts[p].comentarios[c].replies)posts[p].comentarios[c].replies=[]; posts[p].comentarios[c].replies.push({user:usuarioAtual,texto:txt,sub:[]}); localStorage.posts=JSON.stringify(posts); carregar(); }

function responderResposta(p,c,r){ let txt=document.getElementById(`rr${p}_${c}_${r}`).value; if(!txt)return; let posts=JSON.parse(localStorage.posts); if(!posts[p].comentarios[c].replies[r].sub)posts[p].comentarios[c].replies[r].sub=[]; posts[p].comentarios[c].replies[r].sub.push({user:usuarioAtual,texto:txt}); localStorage.posts=JSON.stringify(posts); carregar(); }

function editarComentario(p,c){ let posts=JSON.parse(localStorage.posts); let novo=prompt("Editar",posts[p].comentarios[c].texto); if(novo)posts[p].comentarios[c].texto=novo; localStorage.posts=JSON.stringify(posts); carregar(); }
function deletarComentario(p,c){ let posts=JSON.parse(localStorage.posts); posts[p].comentarios.splice(c,1); localStorage.posts=JSON.stringify(posts); carregar(); }

function editarResposta(p,c,r){ let posts=JSON.parse(localStorage.posts); let novo=prompt("Editar",posts[p].comentarios[c].replies[r].texto); if(novo)posts[p].comentarios[c].replies[r].texto=novo; localStorage.posts=JSON.stringify(posts); carregar(); }
function deletarResposta(p,c,r){ let posts=JSON.parse(localStorage.posts); posts[p].comentarios[c].replies.splice(r,1); localStorage.posts=JSON.stringify(posts); carregar(); }

function carregar(){
 let posts=JSON.parse(localStorage.posts||"[]");
 let postsDiv=document.getElementById("postsDiv");
 postsDiv.innerHTML="";

 posts.forEach((p,i)=>{
 if(!p.comentarios)p.comentarios=[];
 let html=`<div class='post'><h3>${p.titulo}</h3><p>${p.conteudo}</p>`;

 if(usuarioAtual=="ADMIN") html+=`<button onclick='editarPost(${i})'>Editar</button><button onclick='deletarPost(${i})'>Deletar</button>`;

 html+=`<input id='c${i}' placeholder='Comentar'><button onclick='comentar(${i})'>Enviar</button>`;

 p.comentarios.forEach((c,ci)=>{
 if(!c.replies)c.replies=[];
 html+=`<div class='comment'><b>${c.user}:</b> ${c.texto}`;

 if(usuarioAtual=="ADMIN") html+=` <button onclick='editarComentario(${i},${ci})'>✏️</button><button onclick='deletarComentario(${i},${ci})'>🗑️</button>`;

 c.replies.forEach((r,ri)=>{
 if(!r.sub)r.sub=[];
 html+=`<div class='reply'><b>${r.user}:</b> ${r.texto}`;

 if(usuarioAtual=="ADMIN") html+=` <button onclick='editarResposta(${i},${ci},${ri})'>✏️</button><button onclick='deletarResposta(${i},${ci},${ri})'>🗑️</button>`;

 r.sub.forEach(s=>{
 html+=`<div class='subreply'><b>${s.user}:</b> ${s.texto}</div>`;
 });

 html+=`<input id='rr${i}_${ci}_${ri}' placeholder='Responder resposta'><button onclick='responderResposta(${i},${ci},${ri})'>Responder</button>`;
 html+=`</div>`;
 });

 html+=`<input id='r${i}_${ci}' placeholder='Responder comentário'><button onclick='responder(${i},${ci})'>Responder</button>`;
 html+=`</div>`;
 });

 html+=`</div>`;
 postsDiv.innerHTML+=html;
 });
}
</script></body>
</html>
